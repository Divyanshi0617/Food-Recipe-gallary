<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Recipe Project</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Food Recipe Gallery</h1>

<div class="container">

<div class="card" onclick="showRecipe('pizza')">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591" alt="Pizza">
<h2>Pizza</h2>
</div>

<div class="card" onclick="showRecipe('burger')">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd" alt="Burger">
<h2>Burger</h2>
</div>

<div class="card" onclick="showRecipe('pasta')">
<img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9" alt="Pasta">
<h2>Pasta</h2>
</div>

</div>

<div id="recipeBox">
<h2>Recipe</h2>
<p id="recipeText">Click any food image to see recipe.</p>
</div>

<script src="script.js"></script>
</body>
</html>
